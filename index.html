<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>แคตาล็อกสินค้า</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
:root {
  --bg:#f4f2ee;--surface:#fff;--surface2:#ece9e3;
  --accent:#c8a96e;--accent-dark:#9e7840;
  --text:#1a1612;--muted:#7a7068;--light:#b0a898;
  --border:rgba(0,0,0,.09);--radius:14px;--radius-sm:9px;--hh:56px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{-webkit-text-size-adjust:100%}
body{font-family:'Sarabun',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;overscroll-behavior:none}

/* HEADER */
header{
  position:sticky;top:0;z-index:100;height:var(--hh);
  background:var(--text);
  display:flex;align-items:center;justify-content:space-between;padding:0 1rem;
  box-shadow:0 2px 12px rgba(0,0,0,.18);
}
.logo{font-size:19px;font-weight:700;color:var(--accent);letter-spacing:.02em}
.hbtn{
  display:flex;align-items:center;gap:6px;
  padding:8px 14px;border-radius:var(--radius-sm);
  font-family:'Sarabun',sans-serif;font-size:13px;font-weight:600;
  border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.12);
  color:#fff;cursor:pointer;transition:background .15s;white-space:nowrap;
}
.hbtn:active{background:rgba(255,255,255,.22)}
.hbtn svg{width:14px;height:14px;stroke:currentColor}

/* MAIN */
main{max-width:960px;margin:0 auto;padding:1rem}

/* UPLOAD */
#uploadSection{display:flex;align-items:center;justify-content:center;min-height:calc(100vh - var(--hh) - 2rem)}
.upload-card{
  background:var(--surface);border:2.5px dashed var(--accent);border-radius:20px;
  padding:2.5rem 1.5rem;text-align:center;width:100%;max-width:400px;
  cursor:pointer;transition:all .22s;
}
.upload-card:active{background:#fdf8f1;transform:scale(.98)}
.upload-icon{width:68px;height:68px;border-radius:50%;background:#fdf3e3;display:flex;align-items:center;justify-content:center;margin:0 auto 1.1rem}
.upload-icon svg{width:32px;height:32px;stroke:var(--accent)}
.upload-card h2{font-size:18px;font-weight:700;margin-bottom:.5rem}
.upload-card p{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:1.3rem}
.upload-hint{background:var(--bg);border-radius:var(--radius-sm);padding:9px 14px;font-size:12px;color:var(--light);margin-top:.8rem}
.upload-hint strong{color:var(--muted)}
.btn-main{
  display:inline-flex;align-items:center;gap:7px;
  padding:11px 22px;border-radius:var(--radius-sm);
  background:var(--accent);color:var(--text);
  font-family:'Sarabun',sans-serif;font-size:14px;font-weight:700;
  border:none;cursor:pointer;transition:all .18s;
}
.btn-main:active{background:var(--accent-dark);color:#fff}

/* CATALOG */
#catalogSection{display:none}

/* STATS */
.stats-row{display:flex;gap:8px;margin-bottom:1rem;overflow-x:auto;padding-bottom:2px}
.stats-row::-webkit-scrollbar{display:none}
.stat-pill{
  flex-shrink:0;display:flex;align-items:center;gap:5px;
  background:var(--surface);border:1px solid var(--border);border-radius:100px;
  padding:5px 13px;font-size:13px;white-space:nowrap;
}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.da{background:var(--muted)}.do{background:#22c55e}.dm{background:#f59e0b}
.stat-pill strong{font-weight:700}

/* FILTER ROW */
.filter-row{display:flex;gap:8px;align-items:center;margin-bottom:.9rem;flex-wrap:nowrap}
.sw{flex:1;position:relative;min-width:0}
.sw svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:15px;height:15px;stroke:var(--light);pointer-events:none}
#searchBox{
  width:100%;padding:10px 10px 10px 34px;
  border:1.5px solid var(--border);border-radius:var(--radius-sm);
  background:var(--surface);font-family:'Sarabun',sans-serif;font-size:14px;color:var(--text);
  outline:none;transition:border-color .18s;
}
#searchBox:focus{border-color:var(--accent)}

/* BIN SELECT */
.bw{position:relative;flex-shrink:0}
.bw .chev{position:absolute;right:9px;top:50%;transform:translateY(-50%);width:14px;height:14px;stroke:var(--muted);pointer-events:none}
#binSelect{
  appearance:none;-webkit-appearance:none;
  padding:10px 30px 10px 11px;
  border:1.5px solid var(--border);border-radius:var(--radius-sm);
  background:var(--surface);font-family:'Sarabun',sans-serif;font-size:14px;color:var(--text);
  cursor:pointer;outline:none;transition:all .18s;min-width:100px;
}
#binSelect:focus{border-color:var(--accent)}
#binSelect.active{border-color:var(--accent);background:#fdf8f1;font-weight:700;color:var(--accent-dark)}

/* ACTION BAR */
.action-bar{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap}
.abtn{
  display:flex;align-items:center;gap:6px;
  padding:9px 14px;border-radius:var(--radius-sm);
  font-family:'Sarabun',sans-serif;font-size:13px;font-weight:600;
  border:1.5px solid var(--border);cursor:pointer;background:var(--surface);color:var(--muted);
  transition:all .15s;
}
.abtn:active{opacity:.7;transform:scale(.95)}
.abtn.ac{background:var(--accent);color:var(--text);border-color:var(--accent)}
.abtn svg{width:14px;height:14px;stroke:currentColor;flex-shrink:0}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
@media(min-width:480px){.grid{grid-template-columns:repeat(auto-fill,minmax(180px,1fr))}}
@media(min-width:768px){.grid{grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:14px}}

/* CARD */
.card{
  background:var(--surface);border-radius:var(--radius);
  border:1px solid var(--border);overflow:hidden;
  animation:fu .22s ease both;
}
@keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@media(hover:hover){.card:hover{box-shadow:0 6px 24px rgba(0,0,0,.1);transform:translateY(-2px)}}

/* CARD IMAGE */
.ci{position:relative;width:100%;padding-top:75%;background:var(--surface2);overflow:hidden}
.ci img,.no-ph{position:absolute;inset:0;width:100%;height:100%}
.ci img{object-fit:cover}
.no-ph{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;color:var(--light);font-size:11px}
.no-ph svg{width:26px;height:26px;stroke:var(--light);opacity:.5}
.ok-badge{
  position:absolute;top:6px;left:6px;z-index:2;
  background:rgba(34,197,94,.88);color:#fff;font-size:10px;font-weight:700;
  padding:2px 7px;border-radius:100px;
}

/* DESKTOP overlay */
.img-ov{
  position:absolute;inset:0;z-index:3;
  background:rgba(0,0,0,.42);
  display:flex;align-items:center;justify-content:center;gap:7px;flex-wrap:wrap;
  opacity:0;transition:opacity .15s;
}
@media(hover:hover){.ci:hover .img-ov{opacity:1}}

/* MOBILE toolbar pinned bottom */
.img-tb{
  position:absolute;bottom:0;left:0;right:0;z-index:3;
  display:none;
  background:linear-gradient(transparent,rgba(0,0,0,.52));
  padding:16px 6px 7px;
  justify-content:center;gap:7px;flex-wrap:wrap;
}
@media(hover:none){.img-tb{display:flex}.img-ov{display:none}}

.ib{
  width:34px;height:34px;border-radius:50%;
  background:rgba(255,255,255,.93);border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:transform .12s;
}
.ib:active{transform:scale(.84)}
.ib svg{width:15px;height:15px;stroke:var(--text)}
.ib.del svg{stroke:#dc2626}

/* CARD BODY */
.cb{padding:9px 11px 11px}
.cname{font-size:10px;font-weight:700;color:var(--light);text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px}
.cnum{font-size:13px;font-weight:600;color:var(--text);line-height:1.4;margin-bottom:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.bintag{display:inline-block;background:#fdf3e3;color:var(--accent-dark);border:1px solid rgba(200,169,110,.3);border-radius:100px;font-size:11px;font-weight:700;padding:2px 9px}

/* EMPTY */
.empty{display:none;text-align:center;padding:3rem 0;color:var(--light)}
.empty svg{width:40px;height:40px;stroke:var(--light);opacity:.4;margin-bottom:8px}

/* MODAL */
.mbg{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;
  align-items:flex-end;justify-content:center;backdrop-filter:blur(3px);
}
@media(min-width:560px){.mbg{align-items:center}}
.mbg.open{display:flex}
.modal{
  background:var(--surface);width:100%;max-width:440px;
  border-radius:20px 20px 0 0;overflow:hidden;
  animation:su .25s ease;max-height:92vh;display:flex;flex-direction:column;
}
@media(min-width:560px){.modal{border-radius:18px;animation:mi .2s ease}}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes mi{from{opacity:0;transform:scale(.93) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
.mdrag{width:36px;height:4px;border-radius:2px;background:var(--border);margin:10px auto 0}
@media(min-width:560px){.mdrag{display:none}}
.mhead{padding:12px 14px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.mhead h3{font-size:15px;font-weight:700}
.mclose{width:29px;height:29px;border-radius:50%;background:var(--surface2);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center}
.mclose svg{width:14px;height:14px;stroke:var(--muted)}
.mbody{padding:14px;overflow-y:auto;flex:1}
.mfoot{padding:0 14px 18px;display:flex;gap:8px}
.mfoot .abtn{flex:1;justify-content:center;padding:11px}
video#camPrev{width:100%;border-radius:var(--radius-sm);background:#000;display:block;margin-bottom:10px;aspect-ratio:4/3;object-fit:cover}
canvas#snap{display:none}

.url-inp{width:100%;padding:11px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:'Sarabun',sans-serif;font-size:14px;color:var(--text);outline:none;margin-bottom:9px;transition:border-color .18s}
.url-inp:focus{border-color:var(--accent)}
.url-prev{display:none;margin-bottom:9px}
.url-prev img{width:100%;border-radius:var(--radius-sm);max-height:180px;object-fit:contain;background:var(--surface2)}
.url-err{display:none;color:#dc2626;font-size:13px;margin-bottom:8px}

/* SAVE BAR */
#saveBar{
  position:fixed;bottom:0;left:0;right:0;z-index:150;
  background:var(--text);color:#fff;
  padding:10px 16px;font-size:13px;font-weight:600;
  display:flex;align-items:center;gap:8px;
  transform:translateY(100%);transition:transform .28s;
}
#saveBar.show{transform:translateY(0)}
#saveBar svg{width:15px;height:15px;stroke:var(--accent);flex-shrink:0}

/* TOAST */
#toast{
  position:fixed;bottom:68px;left:50%;transform:translateX(-50%) translateY(6px);
  background:rgba(26,22,18,.92);color:#fff;
  padding:9px 18px;border-radius:100px;font-size:13px;font-weight:600;
  opacity:0;transition:all .22s;z-index:300;pointer-events:none;white-space:nowrap;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-thumb{background:var(--light);border-radius:3px}
</style>
</head>
<body>

<header>
  <div class="logo">Catalog Pro</div>
  <button class="hbtn" onclick="document.getElementById('xlFile').click()">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
    นำเข้า Excel
  </button>
  <input type="file" id="xlFile" accept=".xlsx,.xls,.csv" style="display:none" onchange="handleFile(event)">
</header>

<main>
  <!-- UPLOAD -->
  <div id="uploadSection">
    <div class="upload-card" id="uploadBox"
      onclick="document.getElementById('xlFile').click()"
      ondragover="odOver(event)" ondragleave="odLeave()" ondrop="odDrop(event)">
      <div class="upload-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round">
          <rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/>
          <path d="M15 13l-3-3-3 3M12 10v6"/>
        </svg>
      </div>
      <h2>นำเข้าไฟล์ Excel</h2>
      <p>คลิกเพื่อเลือกไฟล์<br>รองรับ .xlsx, .xls, .csv</p>
      <button class="btn-main" onclick="event.stopPropagation();document.getElementById('xlFile').click()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/></svg>
        เลือกไฟล์
      </button>
      <div class="upload-hint"><strong>คอลัมน์:</strong> ITEMNUM &nbsp;/&nbsp; DESCRIPTION &nbsp;/&nbsp; BIN</div>
    </div>
  </div>

  <!-- CATALOG -->
  <div id="catalogSection">
    <div class="stats-row">
      <div class="stat-pill"><span class="dot da"></span>ทั้งหมด <strong id="sAll">0</strong></div>
      <div class="stat-pill"><span class="dot do"></span>มีรูป <strong id="sOk">0</strong></div>
      <div class="stat-pill"><span class="dot dm"></span>ไม่มีรูป <strong id="sMiss">0</strong></div>
    </div>

    <div class="filter-row">
      <div class="sw">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="searchBox" placeholder="ค้นหา ITEMNUM / DESCRIPTION..." oninput="renderGrid()">
      </div>
      <div class="bw">
        <select id="binSelect" onchange="onBinChange()">
          <option value="">BIN ทั้งหมด</option>
        </select>
        <svg class="chev" viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
    </div>

    <div class="action-bar">
      <button class="abtn" onclick="document.getElementById('xlFile').click()">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/></svg>
        เปลี่ยนไฟล์
      </button>
      <button class="abtn ac" id="dlBtn" onclick="downloadAll()">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        ดาวน์โหลดรูป
      </button>
    </div>

    <div class="grid" id="productGrid"></div>
    <div class="empty" id="emptyState">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <p>ไม่พบสินค้า</p>
    </div>
  </div>
</main>

<!-- CAM MODAL -->
<div class="mbg" id="camModal">
  <div class="modal">
    <div class="mdrag"></div>
    <div class="mhead">
      <h3 id="camTitle">ถ่ายรูปสินค้า</h3>
      <button class="mclose" onclick="closeCam()"><svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="mbody">
      <video id="camPrev" autoplay playsinline muted></video>
      <canvas id="snap"></canvas>
    </div>
    <div class="mfoot">
      <button class="abtn" onclick="closeCam()">ยกเลิก</button>
      <button class="abtn ac" onclick="capturePhoto()">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
        ถ่ายรูป
      </button>
    </div>
  </div>
</div>

<!-- URL MODAL -->
<div class="mbg" id="urlModal">
  <div class="modal">
    <div class="mdrag"></div>
    <div class="mhead">
      <h3 id="urlTitle">รูปจาก URL</h3>
      <button class="mclose" onclick="closeUrl()"><svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="mbody">
      <input class="url-inp" id="urlInp" type="url" placeholder="https://example.com/image.jpg" inputmode="url">
      <p class="url-err" id="urlErr">ไม่สามารถโหลดรูปได้ กรุณาตรวจสอบ URL</p>
      <div class="url-prev" id="urlPrev"><img id="urlImg" src="" alt="preview"></div>
    </div>
    <div class="mfoot">
      <button class="abtn" onclick="closeUrl()">ยกเลิก</button>
      <button class="abtn" onclick="previewUrl()">ดูตัวอย่าง</button>
      <button class="abtn ac" onclick="useUrl()">ใช้รูปนี้</button>
    </div>
  </div>
</div>

<!-- SAVE BAR -->
<div id="saveBar">
  <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
  <span id="saveMsg">บันทึกข้อมูลแล้ว</span>
</div>

<div id="toast"></div>

<script>
/* ══ STATE ══ */
let products=[], curIdx=null, camStream=null;

/* ══ INDEXEDDB ══ */
let db;
function openDB(){
  return new Promise((res,rej)=>{
    const r=indexedDB.open('CatalogDB',1);
    r.onupgradeneeded=e=>{
      const d=e.target.result;
      if(!d.objectStoreNames.contains('meta'))   d.createObjectStore('meta');
      if(!d.objectStoreNames.contains('images'))  d.createObjectStore('images');
    };
    r.onsuccess=e=>{db=e.target.result;res();};
    r.onerror=()=>rej(r.error);
  });
}
function idbSet(st,k,v){return new Promise((res,rej)=>{const tx=db.transaction(st,'readwrite');tx.objectStore(st).put(v,k);tx.oncomplete=res;tx.onerror=()=>rej(tx.error);})}
function idbGet(st,k){return new Promise((res,rej)=>{const tx=db.transaction(st,'readonly');const r=tx.objectStore(st).get(k);r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);})}
function idbKeys(st){return new Promise((res,rej)=>{const tx=db.transaction(st,'readonly');const r=tx.objectStore(st).getAllKeys();r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);})}
function idbDel(st,k){return new Promise((res,rej)=>{const tx=db.transaction(st,'readwrite');tx.objectStore(st).delete(k);tx.oncomplete=res;tx.onerror=()=>rej(tx.error);})}

async function saveRows(){
  const rows=products.map(p=>({id:p.id,itemnum:p.itemnum,desc:p.desc,bin:p.bin}));
  await idbSet('meta','rows',rows);
}
async function loadFromDB(){
  const rows=await idbGet('meta','rows');
  if(!rows||!rows.length) return false;
  products=rows.map(r=>({...r,img:null}));
  const keys=await idbKeys('images');
  for(const k of keys){
    const img=await idbGet('images',k);
    const p=products.find(x=>x.itemnum===k);
    if(p&&img) p.img=img;
  }
  return true;
}

/* ══ INIT ══ */
(async()=>{
  await openDB();
  const ok=await loadFromDB();
  if(ok){showCatalog();showToast('โหลดข้อมูลที่บันทึกไว้ ('+products.length+' รายการ)');}
})();

/* ══ FILE ══ */
function odOver(e){e.preventDefault();document.getElementById('uploadBox').style.borderColor='var(--accent-dark)'}
function odLeave(){document.getElementById('uploadBox').style.borderColor=''}
function odDrop(e){e.preventDefault();odLeave();const f=e.dataTransfer.files[0];if(f)parseFile(f);}
function handleFile(e){const f=e.target.files[0];if(f)parseFile(f);e.target.value='';}

function parseFile(file){
  const ext=file.name.split('.').pop().toLowerCase();
  const rd=new FileReader();
  if(ext==='csv'){
    rd.onload=ev=>doRows(XLSX.utils.sheet_to_json(XLSX.read(ev.target.result,{type:'string'}).Sheets[XLSX.read(ev.target.result,{type:'string'}).SheetNames[0]],{defval:''}));
    rd.readAsText(file,'UTF-8');
  }else{
    rd.onload=ev=>{const wb=XLSX.read(ev.target.result,{type:'array'});doRows(XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{defval:''}));};
    rd.readAsArrayBuffer(file);
  }
}

async function doRows(rows){
  if(!rows.length){showToast('ไม่พบข้อมูลในไฟล์');return;}
  const keys=Object.keys(rows[0]);
  const iK=keys.find(k=>/itemnum|item.num|item_num|รหัส/i.test(k))||keys[0];
  const dK=keys.find(k=>/description|desc|ชื่อ|รายละเอียด/i.test(k))||keys[1];
  const bK=keys.find(k=>/^bin$/i.test(k))||keys[2];
  /* รักษารูปเดิม */
  const old={};products.forEach(p=>{if(p.img)old[p.itemnum]=p.img;});
  products=rows.map((r,i)=>({
    id:i,
    itemnum:String(r[iK]||'').trim()||'#'+(i+1),
    desc:String(r[dK]||'').trim(),
    bin:String(r[bK]||'').trim(),
    img:old[String(r[iK]||'').trim()]||null
  }));
  await saveRows();
  showCatalog();
  showToast('โหลด '+products.length+' รายการเรียบร้อย');
  showSave('บันทึกข้อมูล Excel แล้ว');
}

/* ══ CATALOG ══ */
function showCatalog(){
  document.getElementById('uploadSection').style.display='none';
  document.getElementById('catalogSection').style.display='block';
  buildBinSelect();renderGrid();
}
function buildBinSelect(){
  const sel=document.getElementById('binSelect');
  const cur=sel.value;
  const bins=[...new Set(products.map(p=>p.bin).filter(Boolean))].sort();
  sel.innerHTML='<option value="">BIN ทั้งหมด</option>'+
    bins.map(b=>`<option value="${eh(b)}">${eh(b)} (${products.filter(p=>p.bin===b).length})</option>`).join('');
  if(bins.includes(cur))sel.value=cur;
  sel.classList.toggle('active',!!sel.value);
}
function onBinChange(){
  document.getElementById('binSelect').classList.toggle('active',!!document.getElementById('binSelect').value);
  renderGrid();
}

function renderGrid(){
  const q=(document.getElementById('searchBox').value||'').toLowerCase();
  const bin=document.getElementById('binSelect').value;
  const filtered=products.filter(p=>{
    const mb=!bin||p.bin===bin;
    const mq=!q||p.itemnum.toLowerCase().includes(q)||p.desc.toLowerCase().includes(q);
    return mb&&mq;
  });
  document.getElementById('sAll').textContent=products.length;
  document.getElementById('sOk').textContent=products.filter(p=>p.img).length;
  document.getElementById('sMiss').textContent=products.filter(p=>!p.img).length;
  const grid=document.getElementById('productGrid');
  const empty=document.getElementById('emptyState');
  if(!filtered.length){grid.innerHTML='';empty.style.display='block';return;}
  empty.style.display='none';
  grid.innerHTML=filtered.map((p,ai)=>`
    <div class="card" style="animation-delay:${Math.min(ai,20)*.028}s">
      <div class="ci">
        ${p.img
          ?`<img src="${p.img}" alt="${eh(p.itemnum)}" loading="lazy"><span class="ok-badge">✓ มีรูป</span>`
          :`<div class="no-ph"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg><span>ยังไม่มีรูป</span></div>`}
        <div class="img-ov">${ibtns(p)}</div>
        <div class="img-tb">${ibtns(p)}</div>
      </div>
      <div class="cb">
        <div class="cnum">${eh(p.itemnum)}</div>
        <div class="cname">${eh(p.desc)||'—'}</div>
        ${p.bin?`<span class="bintag">${eh(p.bin)}</span>`:''}
      </div>
    </div>`).join('');
}

function ibtns(p){return`
  <button class="ib" onclick="openCam(${p.id})" title="ถ่ายรูป"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg></button>
  <button class="ib" onclick="pickImg(${p.id})" title="เลือกรูป"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></button>
  <button class="ib" onclick="openUrl(${p.id})" title="URL"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg></button>
  ${p.img?`
  <button class="ib" onclick="dlImg(${p.id})" title="ดาวน์โหลด"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></button>
  <button class="ib del" onclick="rmImg(${p.id})" title="ลบ"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg></button>`:''}
`;}

function eh(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

/* ══ CAMERA ══ */
function openCam(idx){
  curIdx=idx;
  const p=products.find(x=>x.id===idx);
  document.getElementById('camTitle').textContent=p.itemnum;
  document.getElementById('camModal').classList.add('open');
  navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'},audio:false})
    .then(s=>{camStream=s;document.getElementById('camPrev').srcObject=s;})
    .catch(()=>{closeCam();showToast('ไม่สามารถเข้าถึงกล้อง');});
}
function closeCam(){
  if(camStream){camStream.getTracks().forEach(t=>t.stop());camStream=null;}
  document.getElementById('camModal').classList.remove('open');
  document.getElementById('camPrev').srcObject=null;
}
function capturePhoto(){
  const v=document.getElementById('camPrev'),c=document.getElementById('snap');
  c.width=v.videoWidth;c.height=v.videoHeight;
  c.getContext('2d').drawImage(v,0,0);
  setImg(curIdx,c.toDataURL('image/jpeg',.88));
  closeCam();showToast('บันทึกรูปเรียบร้อย');
}

/* ══ GALLERY ══ */
function pickImg(idx){
  curIdx=idx;
  const inp=document.createElement('input');inp.type='file';inp.accept='image/*';
  inp.onchange=e=>{
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=ev=>{setImg(curIdx,ev.target.result);showToast('เพิ่มรูปเรียบร้อย');};
    r.readAsDataURL(f);
  };inp.click();
}

/* ══ URL ══ */
function openUrl(idx){
  curIdx=idx;
  const p=products.find(x=>x.id===idx);
  document.getElementById('urlTitle').textContent=p.itemnum;
  document.getElementById('urlInp').value='';
  document.getElementById('urlErr').style.display='none';
  document.getElementById('urlPrev').style.display='none';
  document.getElementById('urlModal').classList.add('open');
  setTimeout(()=>document.getElementById('urlInp').focus(),220);
}
function closeUrl(){document.getElementById('urlModal').classList.remove('open');}
function previewUrl(){
  const url=document.getElementById('urlInp').value.trim();if(!url)return;
  const img=document.getElementById('urlImg');
  document.getElementById('urlErr').style.display='none';
  document.getElementById('urlPrev').style.display='block';
  img.src=url;
  img.onerror=()=>{document.getElementById('urlPrev').style.display='none';document.getElementById('urlErr').style.display='block';};
}
function useUrl(){
  const url=document.getElementById('urlInp').value.trim();if(!url){showToast('กรุณาใส่ URL');return;}
  const c=document.getElementById('snap'),ctx=c.getContext('2d'),img=new Image();
  img.crossOrigin='anonymous';
  img.onload=()=>{
    c.width=img.naturalWidth;c.height=img.naturalHeight;ctx.drawImage(img,0,0);
    try{setImg(curIdx,c.toDataURL('image/jpeg',.88));}catch{setImg(curIdx,url);}
    closeUrl();showToast('เพิ่มรูปจาก URL เรียบร้อย');
  };
  img.onerror=()=>{document.getElementById('urlErr').style.display='block';};
  img.src=url;
}

/* ══ SET / REMOVE IMG ══ */
async function setImg(idx,dataUrl){
  const i=products.findIndex(x=>x.id===idx);if(i===-1)return;
  products[i].img=dataUrl;
  await idbSet('images',products[i].itemnum,dataUrl);
  renderGrid();showSave('บันทึกรูปแล้ว');
}
async function rmImg(idx){
  const i=products.findIndex(x=>x.id===idx);if(i===-1)return;
  await idbDel('images',products[i].itemnum);
  products[i].img=null;
  renderGrid();showToast('ลบรูปแล้ว');
}

/* ══ DOWNLOAD ══ */
function dlImg(idx){
  const p=products.find(x=>x.id===idx);if(!p||!p.img)return;
  const a=document.createElement('a');a.href=p.img;a.download=(p.itemnum||'item')+'.jpg';a.click();
  showToast('ดาวน์โหลดเรียบร้อย');
}
async function downloadAll(){
  const wImg=products.filter(p=>p.img);
  if(!wImg.length){showToast('ยังไม่มีรูปสินค้า');return;}
  if(wImg.length===1){dlImg(wImg[0].id);return;}
  const btn=document.getElementById('dlBtn');
  btn.disabled=true;btn.textContent='กำลังสร้าง ZIP...';
  showToast('กำลังสร้าง ZIP...');
  try{
    if(!window.JSZip){
      await new Promise((res,rej)=>{const s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js';s.onload=res;s.onerror=rej;document.head.appendChild(s);});
    }
    const zip=new JSZip(),folder=zip.folder('images');
    wImg.forEach(p=>{
      const b64=p.img.split(',')[1];
      const ext=p.img.startsWith('data:image/png')?'png':'jpg';
      folder.file((p.itemnum||'item_'+p.id)+'.'+ext,b64,{base64:true});
    });
    const blob=await zip.generateAsync({type:'blob'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download='product-images.zip';a.click();
    setTimeout(()=>URL.revokeObjectURL(url),5000);
    showToast('ดาวน์โหลด '+wImg.length+' รูป เรียบร้อย');
  }catch{showToast('เกิดข้อผิดพลาด');}
  finally{
    btn.disabled=false;
    btn.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke-width="2" width="14" height="14"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> ดาวน์โหลดรูป';
  }
}

/* ══ UI HELPERS ══ */
let sbT;
function showSave(msg){
  document.getElementById('saveMsg').textContent=msg;
  const bar=document.getElementById('saveBar');bar.classList.add('show');
  clearTimeout(sbT);sbT=setTimeout(()=>bar.classList.remove('show'),2400);
}
let toastT;
function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),2500);
}

/* ══ CLOSE ON BACKDROP ══ */
document.getElementById('camModal').addEventListener('click',function(e){if(e.target===this)closeCam();});
document.getElementById('urlModal').addEventListener('click',function(e){if(e.target===this)closeUrl();});
document.getElementById('urlInp').addEventListener('keydown',e=>{if(e.key==='Enter')useUrl();});
</script>
